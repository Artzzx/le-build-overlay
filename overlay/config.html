<!DOCTYPE html>
<!--
  overlay/config.html
  ────────────────────
  Config window: paste a Maxroll build JSON and load it into the overlay.

  This is a normal focusable window (NOT transparent, NOT click-through).
  Opened by pressing F5 while the app is running.

  Flow:
    1. User pastes Maxroll JSON into the textarea
    2. Optionally sets a build name
    3. Clicks "Load Build"
    4. config.js calls window.configAPI.loadBuild() → main.js parses, saves, notifies overlay
    5. On success: window closes automatically
    6. On error: error message shown inline
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LE Build Overlay — Load Build</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0c14;
      --bg-input: #0f1218;
      --border:   rgba(80, 70, 50, 0.7);
      --border-focus: rgba(201, 168, 76, 0.8);
      --gold:     #c9a84c;
      --blue:     #60a5fa;
      --green:    #4ade80;
      --red:      #f87171;
      --text:     #d0c8b0;
      --text-dim: #8a8070;
      --font:     'Rajdhani', 'Segoe UI', sans-serif;
      --font-mono: 'Share Tech Mono', 'Courier New', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      padding: 18px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 4px;
    }

    input[type="text"] {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      padding: 6px 8px;
      border-radius: 2px;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: var(--border-focus);
    }

    textarea {
      width: 100%;
      height: 220px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 11px;
      line-height: 1.5;
      padding: 8px;
      border-radius: 2px;
      resize: vertical;
      outline: none;
    }

    textarea:focus {
      border-color: var(--border-focus);
    }

    textarea::placeholder {
      color: var(--text-dim);
      font-family: var(--font);
      font-size: 12px;
    }

    .row {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    button {
      background: rgba(201, 168, 76, 0.15);
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 7px 18px;
      border-radius: 2px;
      cursor: pointer;
      transition: background 0.1s;
    }

    button:hover {
      background: rgba(201, 168, 76, 0.28);
    }

    button:active {
      background: rgba(201, 168, 76, 0.4);
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    button.secondary {
      background: transparent;
      border-color: var(--border);
      color: var(--text-dim);
    }

    button.secondary:hover {
      border-color: var(--text-dim);
      color: var(--text);
      background: rgba(255,255,255,0.05);
    }

    #status {
      font-size: 12px;
      min-height: 18px;
      padding: 6px 8px;
      border-radius: 2px;
      display: none;
    }

    #status.error {
      display: block;
      background: rgba(248, 113, 113, 0.12);
      border: 1px solid rgba(248, 113, 113, 0.4);
      color: var(--red);
    }

    #status.success {
      display: block;
      background: rgba(74, 222, 128, 0.1);
      border: 1px solid rgba(74, 222, 128, 0.4);
      color: var(--green);
    }

    .hint {
      font-size: 11px;
      color: var(--text-dim);
      line-height: 1.5;
    }

    a {
      color: var(--blue);
      text-decoration: none;
    }
  </style>

  <!-- Fonts (same as overlay) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
</head>
<body>

  <h1>Load Maxroll Build</h1>

  <div class="row">
    <label for="build-name">Build Name (optional)</label>
    <input type="text" id="build-name" placeholder="e.g. Void Knight Erasing Strike" maxlength="60" />
  </div>

  <div class="row">
    <label for="json-input">Maxroll Build JSON</label>
    <textarea
      id="json-input"
      spellcheck="false"
      placeholder='Paste your Maxroll planner JSON here.&#10;&#10;It should look like:&#10;{&#10;  "passives": { "history": [...], "position": 113 },&#10;  "class": 3,&#10;  "mastery": 2,&#10;  "skillTrees": { "fl44": {...}, ... }&#10;}'
    ></textarea>
  </div>

  <div id="status"></div>

  <div class="actions">
    <button id="load-btn">Load Build</button>
    <button class="secondary" id="clear-btn">Clear</button>
    <span class="hint" style="margin-left:auto">F5 to reopen this window</span>
  </div>

  <script src="config.js"></script>
</body>
</html>
