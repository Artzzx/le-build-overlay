<!DOCTYPE html>
<!--
  overlay/config.html
  ────────────────────
  Config window: load a multi-phase loadout into the overlay.

  Each phase is a separate Maxroll export (passives + skills for one build stage).
  Add up to 5 phases using the accordion cards. All phases must use the same class.

  Flow:
    1. Enter an optional loadout name
    2. Add phase cards and paste export codes (one JSON block per line per phase)
    3. Click "Load Loadout" or press Ctrl+Enter
    4. main.js parses all phases, saves loadout to config/build.json, notifies overlay
    5. Window closes on success

  From Maxroll planner:   click Export → copy all lines into a phase textarea.
  From in-game dialog:    export Passives tab + each Skill tab → paste all per phase.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LE Build Overlay — Load Loadout</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0a0c14;
      --bg-input:     #0f1218;
      --bg-phase:     #0d1020;
      --bg-phase-hdr: #111628;
      --border:       rgba(80, 70, 50, 0.7);
      --border-focus: rgba(201, 168, 76, 0.8);
      --gold:         #c9a84c;
      --blue:         #60a5fa;
      --green:        #4ade80;
      --red:          #f87171;
      --text:         #d0c8b0;
      --text-dim:     #8a8070;
      --font:         'Rajdhani', 'Segoe UI', sans-serif;
      --font-mono:    'Share Tech Mono', 'Courier New', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      padding: 16px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: hidden;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
      flex-shrink: 0;
    }

    /* ── Loadout name row ─────────────────────────────────── */

    .name-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .name-row label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-dim);
      white-space: nowrap;
    }

    /* ── Phase list ───────────────────────────────────────── */

    .phases-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .phases-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    #phase-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-right: 2px;
    }

    /* scrollbar */
    #phase-list::-webkit-scrollbar { width: 4px; }
    #phase-list::-webkit-scrollbar-track { background: transparent; }
    #phase-list::-webkit-scrollbar-thumb { background: rgba(80,70,50,0.4); border-radius: 2px; }

    /* ── Phase card ──────────────────────────────────────── */

    .phase-card {
      border: 1px solid var(--border);
      border-radius: 3px;
      background: var(--bg-phase);
      flex-shrink: 0;
    }

    .phase-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      background: var(--bg-phase-hdr);
      cursor: pointer;
      user-select: none;
      border-radius: 3px 3px 0 0;
    }

    .phase-card.collapsed .phase-header {
      border-radius: 3px;
    }

    .phase-index-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      flex-shrink: 0;
      width: 52px;
    }

    .phase-name-input {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid transparent;
      border-radius: 2px;
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      padding: 2px 6px;
      outline: none;
    }

    .phase-name-input:focus {
      border-color: var(--border-focus);
      background: var(--bg-input);
    }

    .phase-name-input::placeholder { color: var(--text-dim); }

    .phase-toggle-btn {
      background: transparent;
      border: none;
      color: var(--text-dim);
      font-size: 12px;
      cursor: pointer;
      padding: 2px 4px;
      flex-shrink: 0;
      line-height: 1;
    }

    .phase-toggle-btn:hover { color: var(--text); }

    .phase-remove-btn {
      background: transparent;
      border: none;
      color: var(--text-dim);
      font-size: 13px;
      cursor: pointer;
      padding: 2px 4px;
      flex-shrink: 0;
      line-height: 1;
    }

    .phase-remove-btn:hover { color: var(--red); }
    .phase-remove-btn:disabled { opacity: 0.2; cursor: default; }

    .phase-body {
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .phase-card.collapsed .phase-body {
      display: none;
    }

    .phase-body label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .phase-json {
      width: 100%;
      height: 90px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 10px;
      line-height: 1.4;
      padding: 6px;
      border-radius: 2px;
      resize: none;
      outline: none;
    }

    .phase-json:focus { border-color: var(--border-focus); }

    .phase-json::placeholder {
      color: var(--text-dim);
      font-family: var(--font);
      font-size: 11px;
    }

    /* ── Form elements (shared) ────────────────────────────── */

    input[type="text"] {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      padding: 5px 8px;
      border-radius: 2px;
      outline: none;
    }

    input[type="text"]:focus { border-color: var(--border-focus); }
    input[type="text"]::placeholder { color: var(--text-dim); }

    /* ── Buttons ──────────────────────────────────────────── */

    button {
      background: rgba(201, 168, 76, 0.15);
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: var(--font);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 2px;
      cursor: pointer;
      transition: background 0.1s;
      white-space: nowrap;
    }

    button:hover   { background: rgba(201, 168, 76, 0.28); }
    button:active  { background: rgba(201, 168, 76, 0.4); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    button.secondary {
      background: transparent;
      border-color: var(--border);
      color: var(--text-dim);
    }
    button.secondary:hover {
      border-color: var(--text-dim);
      color: var(--text);
      background: rgba(255,255,255,0.05);
    }

    button.icon-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 11px;
      padding: 4px 10px;
    }
    button.icon-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(201,168,76,0.08);
    }

    /* ── Status message ───────────────────────────────────── */

    #status {
      font-size: 12px;
      min-height: 16px;
      padding: 5px 8px;
      border-radius: 2px;
      display: none;
      line-height: 1.5;
      flex-shrink: 0;
    }

    #status.error {
      display: block;
      background: rgba(248, 113, 113, 0.12);
      border: 1px solid rgba(248, 113, 113, 0.4);
      color: var(--red);
    }

    #status.success {
      display: block;
      background: rgba(74, 222, 128, 0.1);
      border: 1px solid rgba(74, 222, 128, 0.4);
      color: var(--green);
    }

    /* ── Warning bar ──────────────────────────────────────── */

    .warning-bar {
      background: rgba(248, 113, 113, 0.08);
      border: 1px solid rgba(248, 113, 113, 0.35);
      border-radius: 3px;
      padding: 6px 10px;
      font-size: 11px;
      color: #f87171;
      flex-shrink: 0;
      line-height: 1.4;
    }

    /* ── Saved templates row ──────────────────────────────── */

    .templates-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      padding: 6px 0 6px;
      border-bottom: 1px solid var(--border);
    }

    .templates-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-dim);
      white-space: nowrap;
    }

    #template-select {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
      padding: 4px 6px;
      border-radius: 2px;
      outline: none;
      min-width: 0;
    }

    #template-select:focus { border-color: var(--border-focus); }

    #template-select option { background: var(--bg-input); }

    .templates-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: var(--font);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 2px;
      cursor: pointer;
      white-space: nowrap;
    }
    .templates-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.08); }
    .templates-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .templates-btn.del:hover { border-color: var(--red); color: var(--red); background: rgba(248,113,113,0.08); }

    /* ── Footer ───────────────────────────────────────────── */

    .footer {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      padding-top: 8px;
    }

    .footer .hint {
      margin-left: auto;
      font-size: 10px;
      color: var(--text-dim);
      font-family: var(--font-mono);
    }
  </style>

  <!-- Fonts (same as overlay) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
</head>
<body>

  <h1>Load Loadout</h1>

  <!-- ── Warning ───────────────────────────────────────────────────────────── -->
  <div class="warning-bar">
    ⚠ Loading a loadout replaces the active build and resets all track progress to 0.
    Save a template first if you want to re-edit the export codes later.
  </div>

  <!-- ── Saved templates ───────────────────────────────────────────────────── -->
  <div class="templates-row">
    <span class="templates-label">Saved</span>
    <select id="template-select">
      <option value="">— no saved templates —</option>
    </select>
    <button class="templates-btn" id="template-load-btn" disabled title="Fill form with this template">Fill</button>
    <button class="templates-btn del" id="template-del-btn" disabled title="Delete this template">✕</button>
  </div>

  <!-- ── Loadout name ───────────────────────────────────────────────────────── -->
  <div class="name-row">
    <label for="loadout-name">Loadout Name</label>
    <input type="text" id="loadout-name" placeholder="e.g. Rogue Falconer" maxlength="60" />
  </div>

  <!-- ── Phase list header ─────────────────────────────────────────────────── -->
  <div class="phases-header">
    <span class="phases-label">Phases</span>
    <button class="icon-btn" id="add-phase-btn">+ Add Phase</button>
  </div>

  <!-- ── Phase accordion cards (injected by config.js) ─────────────────────── -->
  <div id="phase-list"></div>

  <!-- ── Status ────────────────────────────────────────────────────────────── -->
  <div id="status"></div>

  <!-- ── Footer ────────────────────────────────────────────────────────────── -->
  <div class="footer">
    <button id="load-btn">Load Loadout</button>
    <button class="secondary" id="save-template-btn" title="Save form inputs as a reusable template">Save Template</button>
    <span class="hint">Ctrl+Enter to load</span>
  </div>

  <script src="config.js"></script>
</body>
</html>
